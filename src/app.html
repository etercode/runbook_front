<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Literata:opsz,ital,wght@7..72,0,400;7..72,0,500;7..72,0,600;7..72,0,700;7..72,1,400;7..72,1,500&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
			rel="stylesheet"
		/>
		<link
			rel="icon"
			href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%231C3D5A'/><path d='M8 7h16v18H8z' fill='%23F4F1EA'/><path d='M11 11h10M11 15h10M11 19h7' stroke='%231C3D5A' stroke-width='1.4'/></svg>"
		/>
		<script>
			(function () {
				try {
					var c = localStorage.getItem('runbook_theme') || 'system';
					var dark =
						c === 'dark' ||
						(c === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
					document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
